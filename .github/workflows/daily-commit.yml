name: Daily Commit Automation

on:
  schedule:
    - cron: '17 2 * * *'   # Runs daily at 02:17 UTC (specific time, no wildcards)
  workflow_dispatch:        # Allows manual trigger

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "22f3001978@ds.study.iitm.ac.in"

      - name: Daily commit by 22f3001978@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date)"
          git push
